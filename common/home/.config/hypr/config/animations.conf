# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = yes

    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = easeinoutcirc, 0.85, 0, 0.15, 1

    #animation = windowsIn, 1, 2, easeinoutcirc, slide
    #animation = windowsOut, 1, 2, default, popin 80%
    #animation = border, 1, 5, default
    #animation = workspacesIn, 1, 4, easeinoutcirc, slide
    #animation = workspacesOut, 1, 4, easeinoutcirc, slidefade 80%
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier, popin 80% 
    animation = windowsOut, 1, 3, myBezier, popin 80%
    animation = fade, 0, 5, default
    animation = workspaces, 1, 3, myBezier
}
