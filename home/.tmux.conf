#!/usr/bin/env bash

# --- GENERAL ---
# big limit (too big?)
set -g history-limit 50000
# automatic titles
set-window-option -g automatic-rename on
set-option -g set-titles on

set -g focus-events on

# numbering at 1
set -g base-index 1

# --- TERMINAL SETTINGS ---
# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Cursor shape changes for different modes
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Enable undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Bracketed paste - prevents formatting issues
set -g set-clipboard on

# --- PERFORMANCE ---
# Display messages for longer (2 seconds instead of 750ms)
set -g display-time 2000

# no escape time for key press
set -sg escape-time 0

# --- INPUT ---
set -g mouse on
setw -g mode-keys vi

# Better word separators for URL selection (double-click will select full URLs)
set -g word-separators " []{}()\"'"
set -ag word-separators "<>"

# prefix n to create new window next to current
bind-key n new-window -a

# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# alt-vim keys to switch panes
# not sure if these 2 work atm
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# alt-vim keys (caps) to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# ctrl-alt-vim keys (caps) to swap windows
bind-key -n S-Left swap-window -t -1\; select-window -t -1
bind-key -n S-Right swap-window -t +1\; select-window -t +1

# prefix + vim keys to switch panes
bind-key "h" select-pane -L
bind-key "j" select-pane -D
bind-key "k" select-pane -U
bind-key "l" select-pane -R
# prefix + shift + vim to switch windows L/R
bind-key "H" previous-window
bind-key "L" next-window

# custom binds for splitting
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"

bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"


# no escape time for key press
set -sg escape-time 0

# reload
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# --- CLIPBOARD ---
# Smart platform-specific copy command detection
# macOS: pbcopy, WSL: clip.exe, Wayland: wl-copy, X11: xclip
if-shell "uname | grep -q Darwin" \
  "set-option -g @copy_cmd 'pbcopy'" \
  "if-shell \"uname -r | grep -q microsoft\" \
    \"set-option -g @copy_cmd 'clip.exe'\" \
    \"if-shell \\\"command -v wl-copy\\\" \
      \\\"set-option -g @copy_cmd 'wl-copy'\\\" \
      \\\"set-option -g @copy_cmd 'xclip -selection clipboard'\\\"\""

# Use system clipboard - copy without resetting scroll
bind -T copy-mode-vi y send-keys -X copy-pipe "#{@copy_cmd}"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
# Unbind MouseDragEnd1Pane to keep selection highlighted after dragging
unbind -T copy-mode-vi MouseDragEnd1Pane

# Double-click to select word and copy
bind-key -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word

# Triple-click to select line and copy
bind-key -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# Ctrl+Click to open URL in browser (macOS)
# bind-key -n C-Mouse1Pane run-shell 'tmux capture-pane -J -p | grep -oE "(https?|ftp)://[^[:space:]]+" | fzf-tmux -d 20% --multi --bind enter:accept | xargs open 2>/dev/null || true'

# Alternative: Click on URL and press 'o' to open
bind-key -T copy-mode-vi o send-keys -X copy-selection \; run-shell 'tmux show-buffer | xargs open 2>/dev/null || true'

# --- UI ---
# dynamic number windows
set -g renumber-windows on

# Copy mode indicator - change status bar when in copy mode
setw -g mode-style 'fg=black bg=yellow bold'

# panes
set -g pane-border-style 'fg=black'
set -g pane-active-border-style 'fg=green'

# customize status line
set -g status-position top  # move bar to top
# default line color
set -g status-style bg="default",fg="white"
# pane separation
set -g pane-border-style fg=coral

# name of session on left
set -g status-left "#[bg=brightyellow]#[fg=black] #S #[bg=default]  "
set -g status-right " %H:%M %d-%b-%y "

# individual windows
set -g window-status-current-style ""
# set -g window-status-separator " #[fg=#808080]| " # include if you want a line separator
set -g window-status-separator "  "
set -g window-status-format "#[fg=#656565]#[bg=default]#W"
set -g window-status-current-format "#[fg=orange]• #[fg=white]#W"
# alignment of windows list
set -g status-justify centre
# prevents 'inverting' of colors with activity, would like to set fg but doesnt work
set -g window-status-activity-style none
