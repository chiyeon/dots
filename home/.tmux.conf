# ~/.tmux.conf

# -------------------------------------------------------------------
# GENERAL
# -------------------------------------------------------------------

set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g automatic-rename on
set -g set-titles on
set -g focus-events on

# Prefer the most recently active client's dimensions.
# Useful when occasionally attaching from multiple devices.
set -g window-size latest

# -------------------------------------------------------------------
# TERMINAL
# -------------------------------------------------------------------

# Inside tmux, applications should see this TERM value.
set -g default-terminal "tmux-256color"

# Add features only for outer terminal types you actually use.
# Check outside tmux with: echo "$TERM"
set -as terminal-features ",xterm-256color:RGB,cstyle,usstyle,clipboard,focus"

# Let tmux copy outward through OSC 52, but do not let applications
# create arbitrary tmux paste buffers through OSC 52.
set -s set-clipboard external

# -------------------------------------------------------------------
# RESPONSIVENESS
# -------------------------------------------------------------------

set -g display-time 2000

# Small enough for Vim, but more reliable for Alt/Meta sequences.
set -sg escape-time 10

# -------------------------------------------------------------------
# INPUT
# -------------------------------------------------------------------

set -g mouse on
setw -g mode-keys vi

set -g word-separators " []{}()\"'<>"

bind-key n new-window -a -c "#{pane_current_path}"

# Pane navigation.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation.
bind -n M-H previous-window
bind -n M-L next-window

# Move windows.
bind -n S-Left  swap-window -t -1 \; select-window -t -1
bind -n S-Right swap-window -t +1 \; select-window -t +1

# Prefix navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H previous-window
bind L next-window

# Splits inherit the pane's current directory.
bind "|"  split-window -h  -c "#{pane_current_path}"
bind "\\" split-window -fh -c "#{pane_current_path}"
bind "-"  split-window -v  -c "#{pane_current_path}"
bind "_"  split-window -fv -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# -------------------------------------------------------------------
# CLIPBOARD
# -------------------------------------------------------------------

bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-selection-and-cancel

# macOS URL opener. This assumes the selected buffer contains one URL.
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi o send-keys -X copy-selection-and-cancel \\; run-shell 'tmux save-buffer - | xargs open 2>/dev/null || true'"

# -------------------------------------------------------------------
# UI
# -------------------------------------------------------------------

set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-justify centre

setw -g mode-style "fg=black,bg=yellow,bold"

set -g pane-border-style "fg=coral"
set -g pane-active-border-style "fg=green"

set -g status-left "#[bg=brightyellow,fg=black] #S #[bg=default]  "
set -g status-right " %H:%M %d-%b-%y "

set -g window-status-separator "  "
set -g window-status-format "#[fg=#656565,bg=default]#W"
set -g window-status-current-format "#[fg=orange]• #[fg=white]#W"
set -g window-status-activity-style "none"
